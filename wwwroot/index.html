<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Library App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page">
    <header>
      <img src="book.png" alt="Library icon" class="header-icon" />
      <div>
        <h1>Library App</h1>
        <p class="subtitle">Gérez votre collection de livres</p>
      </div>
    </header>

    <section class="add-section">
      <h2>Ajouter un livre</h2>
      <div class="form-row">
        <input id="title"  placeholder="Titre du livre" />
        <input id="author" placeholder="Auteur" />
        <button id="addBtn" onclick="addBook()">Ajouter</button>
      </div>
    </section>

    <section class="list-section">
      <h2>Liste des livres</h2>
      <ul id="booksList"></ul>
      <p id="emptyMsg" class="empty">Aucun livre pour l'instant. Ajoutez-en un !</p>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
